name: Coverage Update

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov coverage[toml]
        pip install -e .

    - name: Run tests and generate coverage report
      run: |
        pytest
        # Usamos python para generar el reporte y limpiar las rutas de Windows a Linux
        python -m coverage report --format=markdown > coverage_report.md

    - name: Update README
      shell: bash # Forzamos bash incluso en runners de windows si hiciera falta
      run: |
        # Usamos un script de python para inyectar la tabla, que es más seguro que sed entre OS
        python -c "
        import pathlib
        report = pathlib.Path('coverage_report.md').read_text()
        readme = pathlib.Path('README.md').read_text()
        start_marker = ''
        end_marker = ''
        new_readme = readme.split(start_marker)[0] + start_marker + '\n' + report + '\n' + end_marker + readme.split(end_marker)[1]
        pathlib.Path('README.md').write_text(new_readme)
        "

    - name: Commit and push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md
        git commit -m "docs: update coverage table in README [skip ci]" || echo "No changes to commit"
        git push